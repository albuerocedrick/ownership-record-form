<div class="max-w-5xl mx-auto space-y-6 pb-20" data-roles="staff admin">
  <!-- Page Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
        Add New Record
      </h1>
      <p class="text-sm text-slate-500">
        Create a new Tax Declaration or Property Ownership record.
      </p>
    </div>
    <button
      onclick="loadComponent('pages/records.html', 'main-content')"
      class="text-sm text-slate-500 hover:text-slate-800 flex items-center gap-1 transition-colors"
    >
      <i class="ph ph-arrow-left"></i> Cancel & Return
    </button>
  </div>

  <form onsubmit="event.preventDefault()" class="space-y-6">
    <!-- SECTION 1: Owner Information -->
    <div
      class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden"
    >
      <div
        class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex items-center gap-2"
      >
        <i class="ph ph-user-circle text-lg text-slate-500"></i>
        <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wide">
          1. Owner Information
        </h2>
      </div>

      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Full Name -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Owner Full Name <span class="text-red-500">*</span></label
          >
          <input
            type="text"
            placeholder="Last Name, First Name, Middle Initial"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow"
            required
          />
          <p class="text-[0.65rem] text-slate-400 mt-1">
            Format: Dela Cruz, Juan A.
          </p>
        </div>

        <!-- Contact Number -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Contact Number</label
          >
          <div class="relative">
            <span class="absolute left-3 top-2.5 text-slate-400 text-sm"
              >+63</span
            >
            <input
              type="tel"
              placeholder="912 345 6789"
              class="w-full border border-slate-300 rounded-lg pl-10 pr-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow"
            />
          </div>
        </div>

        <!-- Email Address -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Email Address (Optional)</label
          >
          <input
            type="email"
            placeholder="owner@email.com"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow"
          />

        <!-- Address -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Complete Mailing Address <span class="text-red-500">*</span></label
          >
          <textarea
            rows="2"
            placeholder="House No., Street, Subdivision, Barangay, City/Municipality"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow"
            required
          ></textarea>
        </div>
      </div>
    </div>

    <!-- SECTION 2: Property Information -->
    <div
      class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden"
    >
      <div
        class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex items-center gap-2"
      >
        <i class="ph ph-map-pin-line text-lg text-slate-500"></i>
        <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wide">
          2. Property Details
        </h2>
      </div>

      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- TD Number with Toggle -->
        <div class="md:col-span-2">
          <div class="flex items-center justify-between mb-1">
            <label class="block text-sm font-medium text-slate-700"
              >Tax Declaration (TD) Number
              <span class="text-red-500">*</span></label
            >
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-500">Manual Entry</span>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" checked class="sr-only peer" />
                <div
                  class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-slate-800"
                ></div>
              </label>
              <span class="text-xs font-bold text-slate-700"
                >Auto-Generate</span
              >
            </div>
          </div>
          <div class="relative">
            <input
              type="text"
              value="TD-2026-AUTO-001"
              readonly
              class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-sm text-slate-500 cursor-not-allowed focus:outline-none"
            />
            <i
              class="ph ph-lock-key absolute right-3 top-2.5 text-slate-400"
            ></i>
          </div>
        </div>

        <!-- Barangay -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Barangay Location <span class="text-red-500">*</span></label
          >
          <div class="relative">
            <select
              class="w-full appearance-none border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none bg-white"
            >
              <option value="" disabled selected>Select Barangay</option>
              <option value="pob">Poblacion</option>
              <option value="sanjose">San Jose</option>
              <option value="stamaria">Sta. Maria</option>
              <option value="burgos">Burgos</option>
              <option value="rizal">Rizal</option>
            </select>
            <i
              class="ph ph-caret-down absolute right-3 top-3 text-slate-400 pointer-events-none"
            ></i>
          </div>
        </div>

        <!-- Lot Number -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Lot / Block / Survey No.</label
          >
          <input
            type="text"
            placeholder="Lot 1 Blk 2 Psd-..."
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow"
          />
        </div>

        <!-- Classification -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Property Classification <span class="text-red-500">*</span></label
          >
          <div class="relative">
            <select
              class="w-full appearance-none border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none bg-white"
            >
              <option value="" disabled selected>Select Class</option>
              <option value="residential">Residential</option>
              <option value="commercial">Commercial</option>
              <option value="industrial">Industrial</option>
              <option value="agricultural">Agricultural</option>
              <option value="mineral">Mineral</option>
            </select>
            <i
              class="ph ph-caret-down absolute right-3 top-3 text-slate-400 pointer-events-none"
            ></i>
          </div>
        </div>

        <!-- Date Registered -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Date Registered <span class="text-red-500">*</span></label
          >
          <input
            type="date"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow text-slate-600"
          />
        </div>

        <!-- Land Area -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Land Area (sq.m) <span class="text-red-500">*</span></label
          >
          <input
            type="number"
            placeholder="0.00"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow"
          />
        </div>

        <!-- Assessed Value -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Assessed Value (PHP) <span class="text-red-500">*</span></label
          >
          <div class="relative">
            <span
              class="absolute left-3 top-2.5 text-slate-500 font-bold text-sm"
              >₱</span
            >
            <input
              type="number"
              placeholder="0.00"
              class="w-full border border-slate-300 rounded-lg pl-8 pr-3 py-2.5 text-sm focus:ring-2 focus:ring-slate-400 focus:border-slate-400 outline-none transition-shadow font-mono"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- SECTION 3: Document Uploads -->
    <div
      class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden"
    >
      <div
        class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex items-center gap-2"
      >
        <i class="ph ph-files text-lg text-slate-500"></i>
        <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wide">
          3. Legal Attachments
        </h2>
      </div>

      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Deed of Sale -->
        <div
          class="border-2 border-dashed border-slate-300 rounded-xl p-6 flex flex-col items-center justify-center text-center hover:bg-slate-50 transition-colors cursor-pointer group"
        >
          <div
            class="h-10 w-10 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:bg-slate-200 transition-colors"
          >
            <i class="ph ph-file-text text-xl text-slate-500"></i>
          </div>
          <span class="text-sm font-medium text-slate-700">Deed of Sale</span>
          <span class="text-xs text-slate-400 mt-1"
            >Click to upload or drag file</span
          >
          <input type="file" class="hidden" />
        </div>

        <!-- Title Copy -->
        <div
          class="border-2 border-dashed border-slate-300 rounded-xl p-6 flex flex-col items-center justify-center text-center hover:bg-slate-50 transition-colors cursor-pointer group"
        >
          <div
            class="h-10 w-10 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:bg-slate-200 transition-colors"
          >
            <i class="ph ph-certificate text-xl text-slate-500"></i>
          </div>
          <span class="text-sm font-medium text-slate-700"
            >Copy of Title (TCT/OCT)</span
          >
          <span class="text-xs text-slate-400 mt-1"
            >Click to upload or drag file</span
          >
          <input type="file" class="hidden" />
        </div>

        <!-- Other Attachments (Full Width) -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1"
            >Other Supporting Documents</label
          >
          <input
            type="file"
            multiple
            class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer border border-slate-200 rounded-lg"
          />
        </div>
      </div>
    </div>

    <!-- Action Buttons (Sticky Bottom or Just Bottom) -->
    <div
      class="flex items-center justify-end gap-4 pt-4 border-t border-slate-200 mt-8"
    >
      <button
        type="button"
        onclick="loadComponent('pages/records.html', 'main-content')"
        class="px-6 py-2.5 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 shadow-sm transition-colors"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="px-6 py-2.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 shadow-sm transition-colors"
      >
        Save & Add Another
      </button>
      <button
        type="submit"
        class="px-6 py-2.5 text-sm font-bold text-white bg-slate-900 rounded-lg hover:bg-slate-800 shadow-lg hover:shadow-xl transition-all flex items-center gap-2"
      >
        <i class="ph ph-floppy-disk"></i> Save Record
      </button>
    </div>
  </form>
</div>
